<!DOCTYPE html>
<html>
<head>
<title>WEB OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #66c4b4; min-height: 100vh; font-family: sans-serif; }

  .taskbar 
  {
  position: fixed;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 70px;
  height: 450px;
  background: #ffffff;
  border: 2px solid #000000;
  border-radius: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.taskbar button 
{
  width: 46px;
  height: 46px;
  background: #ffffff;
  border: 2px solid #000000;
  border-radius: 16px;
  cursor: pointer;
  color: black;
}

.taskbar button:hover 
{
  background: #e0e0e0;
}

.window
{
    display: none;
    position: fixed;
    left: 50%;      
    top: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: #ffffff;
    border: 5px solid #000000;
    border-radius: 5px;
    z-index: 2000;
    flex-direction: column;
}

.window.open 
{
    display: flex;
}

 .window-close 
 {
    width: 24px;
    height: 24px;
    background: #000000;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .window-content 
 {
    flex: 1;
    padding: 16px;
  }

  .window-titlebar
  {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 2px solid #000000;
  }

</style>
</head>
<body>

  <div class="taskbar">
    <button onclick="openWindow('Files', '📁')">📁</button>
    <button onclick="openWindow('Explorer', '🪐')">🪐</button>
    <button onclick="openWindow('Nuclear', '☢️')">☢️</button>
    <button onclick="openWindow('Games', '🎮')">🎮</button>
    <button onclick="openWindow('Paint', '🎨')">🎨</button>
    <button onclick="openWindow('Music', '🎵')">🎵</button>
    <button onclick="openWindow('Settings', '⚙️')">⚙️</button>
  </div>

  <div class="window" id="popup">
  <div class="window-titlebar">
  <span class="window-title" id="popup-title">Window</span>
  <button class="window-close" onclick="closeWindow()">❌</button>
  </div>
     
     <div class="window-content" id="popup-content"></div>
  </div>

  <script>
    function openWindow(name, icon) 
    {
      document.getElementById('popup-title').textContent = icon + ' ' + name;
      document.getElementById('popup-content').textContent = name + ' test 123';
      document.getElementById('popup').classList.add('open');
    }

    function closeWindow() 
    {
      document.getElementById('popup').classList.remove('open');
    }
  </script>

</body>
</html>
