<!DOCTYPE html>
<html>
<head>
<title>WEB OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; min-height: 100vh; font-family: sans-serif; }

  .taskbar 
  {
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 300px;
    background: #111111;
    border-radius: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .taskbar button 
  {
    width: 36px;
    height: 36px;
    background: #2a2a2a;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: white;
  }

  .taskbar button:hover 
  {
  background: #3a3a3a;
  }

</style>
</head>
<body>

  <div class="taskbar">
    <button>number1</button>
    <button>number2</button>
    <button>number3</button>
    <button>number4</button>
  </div>

</body>
</html>
