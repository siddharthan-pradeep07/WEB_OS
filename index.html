<!DOCTYPE html>
<html>
<head>
<title>WEB OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
 body 
 { 
    background: #646b6a7c; 
    min-height: 100vh; 
    font-family: sans-serif; 
}
 body
 {
    background-image: url('photos/web_os_bg.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
 }

 body::before
 {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(217, 224, 223, 0.411);
    backdrop-filter: blur(10px);
    z-index: 0;
 }

.taskbar-vertical
{
    position: fixed;
    left: 12px;
    top: 500px;
    width: 50px;
    height: calc(100vh - 620px);
    background: #ffffffb9;
    border-radius: 10px 10px 0 0;
    z-index: 1000;
}

.taskbar-curve
{
    position: fixed;
    left: 12px;
    bottom: 30px;
    width: 100px;
    height: 100px;
    background: transparent;
    z-index: 1000;
    overflow: hidden;
}

.taskbar-curve::before
{
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100px;
    height: 100px;
    border-radius: 0 0 0 100px;
    border-left: 50px solid #ffffffb9;
    border-bottom: 50px solid #ffffffb9;
    box-sizing: border-box;

}

.taskbar-horizontal 
{
  position: fixed;
  left: 112px;
  bottom: 30px;
  height: 50px;
  width: calc(100vw - 1500px);
  background: #ffffffb9;
  border-radius: 0 10px 10px 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 12px;
}

.taskbar-vertical button, .taskbar-horizontal button
{
    width: 46px;
    height: 46px;
    background: none;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 26px;   
}

.taskbar-vertical button:hover, .taskbar-horizontal button:hover
{
    background: #e0e0e0b9;
    width: 46px;
    height: 46px;
    font-size: 27px;
}

.window
{
    display: none;
    position: fixed;
    left: 50%;      
    top: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: #ffffff62;
    border: 3px solid #5c4e4eab;
    border-radius: 15px;
    z-index: 2000;
    flex-direction: column;
}

.window.open 
{
    display: flex;
}

 .window-close 
 {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .window-subtract 
 {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .window-close:hover, .window-subtract:hover
  {
    background: #493636;
  }


  .window-content 
 {
    flex: 1;
    padding: 16px;
    display: flex;
  }

  .window-titlebar
  {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 2px solid #000000b2;
    font-weight: bold;
  }
  
  .window-subtract { color: #443232; font-size: 16px;}
  .window-close { color: #443232; font-size: 16px;}

</style>
</head>
<body>
   <CENTER style="position:relative; z-index:1;"><P><b>WEB OS</b></P></CENTER>
   <!--         <p id="currentTime" style="position:fixed; top:16px; right: 16px;  z-index:1000;"></p>  -->
   <!--         <script src="script.js"></script>               -->


  <div id="currentTime" style="position: fixed; top:16px; right: 16px; background: #00000088; border: 5px solid #ff5656; border-radius: 10px; padding: 8px 16px; font-family: 'Orbitron', sans-serif; font-size: 24px; color: #ffffff; letter-spacing: 4px; z-index:1000; font-weight: 500 "></div>
  <div class="taskbar-vertical">
    <div style="display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px 0;"></div>
      <button onclick="openWindow('Files', '📂', 'Files here')">📂</button>
      <button onclick="openWindow('searchy', '🔴', 'search what you want')">🔴</button>
      <button onclick="openWindow('Nuclear IDE', '☢️', 'Nuclear IDE program here')">☢️</button>
      <button onclick="openWindow('Data logger', '📟', 'Log data here')">📟</button>
    </div>
 </div> 
 <div class="taskbar-curve"></div>
 <div class="taskbar-horizontal">
   <div style="display:flex; flex-direction:row; align-items:center; gap:12px; padding:0 12px; height:100%;"></div>
     <button onclick="openWindow('Games', '🎮', 'play games here')">🎮</button>
     <button onclick="openWindow('Paint', '🎨', 'Paint here')">🎨</button>
     <button onclick="openWindow('Music', '📻', 'listn to music here')">📻</button>
     <button onclick="openWindow('Settings', '🧻', 'Settings')">🧻</button>
   </div>
 </div>

<div class="window" id="popup">
<div class="window-titlebar">
  <span class="window-title" id="popup-title">Window</span>
  <div style="display:flex; gap:4px; align-items:center;">
    <button class="window-subtract" onclick="subtractWindow()"><b>—</b></button>
    <button class="window-close" onclick="closeWindow()"><b>✕</b></button> 
  </div>
</div>
     
     <div class="window-content" id="popup-content"></div>
  </div>

  <script>
    let windows = {};
let currentApp = null;

function openWindow(name, icon, content)
{
  if (currentApp === 'Nuclear IDE')
  {
    const ta = document.querySelector('#popup-content textarea'); // Took reference from a html forum for this part [this line and the next line]
    if (ta) windows['Nuclear IDE'] = '<textarea style="width:100%; height:100%; border:2px solid #000000; border-radius:5px; outline:none; resize:none; font-family:monospace; font-size:14px;">' + ta.value + '</textarea>';
  }

  
  if (currentApp && currentApp !== name)
   {
     document.getElementById('popup').classList.remove('open');
   }

  currentApp = name;

  if (!windows[name])
  {
    if (name === 'Nuclear IDE')
     {
       windows[name] = '<textarea style="width:100%; height:100%; border:2px solid #000000; border-radius:5px; outline:none; resize:none; font-family:monospace; font-size:14px;"></textarea>';
     }
    else
     {
       windows[name] = content;
     }
  }

  document.getElementById('popup-title').textContent = icon + ' ' + name;

  if (name === 'Nuclear IDE')
   {
     document.getElementById('popup-content').innerHTML = windows[name];
   }
  else
   {
     document.getElementById('popup-content').textContent = windows[name];
   }

   document.getElementById('popup').classList.add('open');
}

function subtractWindow()
  {
    document.getElementById('popup').classList.remove('open');
  }

function closeWindow()
  {
    if (currentApp) delete windows[currentApp];
    currentApp = null;
    document.getElementById('popup').classList.remove('open');
  }
function updateTime() 
  { 
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
 }
     updateTime();
     setInterval(updateTime, 1000);
</script>

</body>
</html>
