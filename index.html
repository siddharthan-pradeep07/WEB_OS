<!DOCTYPE html>
<html>
<head>
<title>WEB OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; min-height: 100vh; font-family: sans-serif; }

  .taskbar 
  {
    position: fixed;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 70px;
    height: 400px;
    background: #000000;
    border-radius: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .taskbar button 
  {
    width: 46px;
    height: 46px;
    background: #ffffffbd;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: white;
  }

  .taskbar button:hover 
  {
  background: #3a3a3a;
  }

</style>
</head>
<body>

  <div class="taskbar">
    <button>📁</button>
    <button>🪐</button>
    <button>☢️</button>
    <button>🎮</button>
    <button>🎨</button>
    <button>🎵</button>
  </div>

</body>
</html>
