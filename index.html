<!DOCTYPE html>
<html>
<head>
<title>WEB OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; min-height: 100vh; font-family: sans-serif; }

  .taskbar 
  {
  position: fixed;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 70px;
  height: 400px;
  background: #ffffff;
  border: 2px solid #000000;
  border-radius: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.taskbar button 
{
  width: 46px;
  height: 46px;
  background: #ffffff;
  border: 2px solid #000000;
  border-radius: 16px;
  cursor: pointer;
  color: black;
}

.taskbar button:hover 
{
  background: #e0e0e0;
}

</style>
</head>
<body>

  <div class="taskbar">
    <button>📁</button>
    <button>🪐</button>
    <button>☢️</button>
    <button>🎮</button>
    <button>🎨</button>
    <button>🎵</button>
  </div>

</body>
</html>
