<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

 body

    background-image: url('photos/web_os_bg.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
 }

 body::before
 {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(217, 224, 223, 0.411);
    backdrop-filter: blur(10px);
    z-index: 0;
 }

.taskbar-left
{ 
    position: fixed;
    left: 12px;
    bottom: 82px;
    width: 70px;
    height: 300px;
    background: #ffffff;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    top: unset;
    transform: none;
    border-radius: 10px 10px 0px 0px;
}

.taskbar-bottom 
{
  position: fixed;
  bottom: 12px;
  left: 82px;
  height: 70px;
  background: #ffffff;
  border-radius: 0px 10px 10px 10px;
  z-index: 1000;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 0 12px;
}

.taskbar-left button, .taskbar-bottom button
{
    width: 46px;
    height: 46px;
    background: #ffffff71;
    border: 2px solid #000000;
    border-radius: 10px;
    cursor: pointer;
    color: black;
    font-size: 20px;
}

.taskbar-left button:hover, .taskbar-bottom button:hover 
{
  background: #e0e0e0b9;
  width: 50px;
  height: 50px;
}

.taskbar-corner {
  position: fixed;
  bottom: 12px;
  left: 12px;
  width: 70px;
  height: 70px;
  background: #ffffff;
  border-radius: 0px 0px 0px 10px;
  z-index: 999;
}

.window
{
    display: none;
    position: fixed;
    left: 50%;      
    top: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: #ffffff65;
    border: 3px solid #000000;
    border-radius: 8px;
    z-index: 2000;
    flex-direction: column;
}

.window.open 
{
    display: flex;
}

 .window-close 
 {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .window-subtract 
 {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .window-content 
 {
    flex: 1;
    padding: 16px;
    display: flex;
  }

  .window-titlebar
  {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 2px solid #000000;
  }

  .window-subtract { color: red; font-size: 16px;}
  .window-close { color: red; font-size: 16px;}

</style>
</head>
<body>
   <CENTER style="position:relative; z-index:1;"><P><b>WEB OS</b></P></CENTER>
   <CENTER style="position:relative; z-index:1;"><p id="currentTime"></p></CENTER>
   <!--         <script src="script.js"></script>               -->
  <div class="taskbar-left">
    <button onclick="openWindow('Files', '📁', 'A quick brown fox jumps over a lazy dog')">📁</button>
    <button onclick="openWindow('searchy', '🪐', 'search what you want')">🪐</button>
    <button onclick="openWindow('Nuclear IDE', '☢️', 'Nuclear IDE program here')">☢️</button>
  </div> 
  <div class="taskbar-corner"></div>
  <div class="taskbar-bottom">
    <button onclick="openWindow('Games', '🎮', 'play games here')">🎮</button>
    <button onclick="openWindow('Paint', '🎨', 'Paint here')">🎨</button>
    <button onclick="openWindow('Music', '🎵', 'listn to music here')">🎵</button>
    <button onclick="openWindow('Settings', '⚙️', 'Settings')">⚙️</button>
  </div>

<div class="window" id="popup">
<div class="window-titlebar">
  <span class="window-title" id="popup-title">Window</span>
  <div style="display:flex; gap:4px; align-items:center;">
    <button class="window-subtract" onclick="subtractWindow()"><b>—</b></button>
    <button class="window-close" onclick="closeWindow()"><b>✕</b></button>
  </div>
</div>
     
     <div class="window-content" id="popup-content"></div>
  </div>

  <script>
    let windows = {};
let currentApp = null;

function openWindow(name, icon, content)
{
  if (currentApp === 'Nuclear IDE')
  {
    const ta = document.querySelector('#popup-content textarea'); // Took reference from a html forum for this part [this line and the next line]
    if (ta) windows['Nuclear IDE'] = '<textarea style="width:100%; height:100%; border:2px solid #000000; border-radius:5px; outline:none; resize:none; font-family:monospace; font-size:14px;">' + ta.value + '</textarea>';
  }

  
  if (currentApp && currentApp !== name)
   {
     document.getElementById('popup').classList.remove('open');
   }

  currentApp = name;

  if (!windows[name])
  {
    if (name === 'Nuclear IDE')
     {
       windows[name] = '<textarea style="width:100%; height:100%; border:2px solid #000000; border-radius:5px; outline:none; resize:none; font-family:monospace; font-size:14px;"></textarea>';
     }
    else
     {
       windows[name] = content;
     }
  }

  document.getElementById('popup-title').textContent = icon + ' ' + name;

  if (name === 'Nuclear IDE')
   {
     document.getElementById('popup-content').innerHTML = windows[name];
   }
  else
   {
     document.getElementById('popup-content').textContent = windows[name];
   }

   document.getElementById('popup').classList.add('open');
}

function subtractWindow()
  {
    document.getElementById('popup').classList.remove('open');
  }

function closeWindow()
  {
    if (currentApp) delete windows[currentApp];
    currentApp = null;
    document.getElementById('popup').classList.remove('open');
  }
function updateTime() 
  { 
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
 }
     updateTime();
     setInterval(updateTime, 1000);
</script>

</body>
