<!DOCTYPE html>
<html>
    <head>
        <title>Games</title>
        <link href="https://fonts.googleapis.com/css2?family=Honk&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box;}

            body
            {
                background: transparent;
                font-family: sans-serif;
                padding: 16px;
            }

            .games-grid
            {
                display: grid;
                grid-template-columns: repeat(4,1fr);
                gap: 12px;
            }
            .game-icon
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 12px;
                border-radius: 12px;
                cursor: pointer;
                border: 2px solid #3d3636ab;
                background: #ffffff67
            }
            .game-icon:hover
            {
                background: #ffffffc2;
            }
            .game-icon span
            {
                font-size: 64px;  
            }
            .game-icon p
            {
                font-size: 12px; text-align: center;
            }
            h1
            {
                font-family: honk, sans-serif;
            }
            

        </style>
    </head>
    <body>
        <h1>Games & Apps</h1>
        <div class="games-grid">
            <div class="game-icon" onclick="location.href='calculator.html'">
                <span>🧮</span>
                <p>Calculator</p>
            </div>
            <div class="game-icon" onclick="location.href='searchy.html'">
                <span>🗿</span>
                <p>Searchy</p>
            </div>
            <div class="game-icon" onclick="location.href='musicapp.html'">
                <span>🎵</span>
                <p>MusicApp</p>
            </div>
            <div class="game-icon" onclick="location.href='snake.html'">
                <span>🐍</span>
                <p>Snake</p>
            </div>
            <div class="game-icon" onclick="location.href='README.md'">
                <span>📚</span>
                <p>README</p>
            </div>
</html>
