<!DOCTYPE html>
<html>
    <head>
        <title>Paint</title>
        <style>
            body
            {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 10px;
                background: transparent;
                font-family: sans-serif;
            }

            button
            {
                padding: 6px 14px;
                border: 1.5px solid #59616991;
                border-radius: 8px;
                background: #ffffff63;
                cursor: pointer;
                font-size: 13px;
            }
             
            button:hover
            {
                background: #ffffff91;
            }

            button.active
            {
                background: #ffffff91;
                border-color: #333333;
                font-weight: bold;
            }

            .divider
            {
                width: 1px;
                height: 24px;
                background: #59616991
            }

            #color-input
            {
                width: 34px;
                height: 34px;
                border: 1.5px solid #59616991;
                border-radius: 8px;
                padding: 2px;
                cursor: pointer;
                background: none;
            }

            .size-btn
            {
                width: 28px;
                height: 28px;
                padding: 0 ;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
            }
             
            .toolbar
            {
                display: flex;
                align-items: center;
                gap: 10px;
                background: #ffffff63;
                border: 1.5px solid #59616991;
                padding: 8px 14px;
                flex-wrap: wrap;
                justify-content: center;
            }

            label
            {
                font-size: 12px;
                color: #555555
            }

            #grid
            {
                display: grid;
                grid-template-columns: repeat(50, 8px);
                border: 2px solid #333;
                border-radius: 8px;
                cursor: crosshair;
                overflow: hidden;
            }

            .pixel
            {
                width: 8px;
                height: 8px;
                border: 0.5px solid #eeeeeeda;
                background: #ffffff;

            }
        </style>
    </head>
    <body>
        <div class="toolbar">
            <button class="active" id="btn-draw" onclick="setMode('draw')">Draw</button>
            <button id="btn-erase" onclick="setMode('erase')">Erase</button>
            <button id="btn-fill" onclick="setMode('fill')">Fill</button>
            <div class="divider"></div>
            <label>Size</label>
            <button class="size-btn active" id="s1"onclick="setBrush(1)">1</button>
            <button class="size-btn" id="s2" onclick="setBrush(2)">2</button>
            <button class="size-btn" id="s3" onclick="setBrush(3)">3</button>
            <div class="divider"></div> 
            <label>Color</label>
            <input type="color" id="color-input" value="#000000">
            <div class="divider"></div>
            <button onclick="clearGrid()">Clear</button>  
        </div>

        <div id="grid"></div>

        <script>
            let paiting = false;
            let mode = 'draw';

            for (let i = 0; i < 2500; i++)
            {
                const pixel = document.createElement('div');
                pixel.classList.add('pixel');
                pixel.addEventListener('mousedown', () => { paiting = true; paint(pixel);});
                pixel.addEventListener('mouseover', () => { if (paiting) paint(pixel); });
                document.getElementById('grid').appendChild(pixel);
            }

            document.addEventListener('mouseup', () => paiting = false);

            function paint(pixel)
            {
                pixel.style.background = mode === 'draw' ? 'black' : 'white';
        
            }
        </script>
    </body>
</html>
