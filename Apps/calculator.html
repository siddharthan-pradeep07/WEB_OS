<html>
    <head>
        <title>Calculator</title>
        <style>
            body 
            {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: transparent;
            }
            .calculator
            {
                display: flex;
                flex-direction: column;
                gap: 8px;
                background: transparent;
            }
            #display
            {
                padding: 14px;
                font-size: 28px;
                text-align: right;
                border: 2px solid #00000027;
                border-radius: 10px;
                background: #ffffff62;
            }
            .buttons
            {
               display: grid;
               grid-template-columns: repeat(4, 1fr);
               gap: 6px;
            }
            button
            {
                padding: 14px;
                font-size: 16px;
                border: 1.5px solid #5c4e4eab;
                border-radius: 10px;
                background: #ffffff62;
                cursor: pointer;
            }
            button:hover
            {
                background: #ffffffc2;
            }
            .span-two
            {
                grid-column: span 2;
            }

        </style>
    </head>
    <body>
        <div class="calculator">
            <div id="display">0</div>
            <div class="buttons">
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button onclick="chooseOperation('/')">÷</button>

                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button onclick="chooseOperation('*')">×</button>

                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button onclick="chooseOperation('-')">-</button>

                <button onclick="appendNumber('.')">.</button>
                <button class="span-two" onclick="appendNumber('0')">0</button>
                <button onclick="chooseOperation('+')">+</button>
                <button onclick="del()">⌫</button>

                <button class="span-two" style="background:#ff00002b; color:#000000c2;" onclick="clearDisplay()">C</button>
                <button class="span-two" style="background:#00ff002b; color:#000000c2;" onclick="calculateResult()">=</button>
            </div>
        </div>

        <script>
            let value = '0';
            const d = document.getElementById('display');

            function appendNumber(num)
            {
                if(value === '0' && num !== '.')
                {
                    value = num;
                }
                else              
                {
                    value += num;
                }
                else if(num === '.' && value.indexOf('.') !== -1)
                {
                    return;
                }
            }

            function chooseOperation(op)
            {
                if(value.endsWith('/') || value.endsWith('*') || value.endsWith('-') || value.endsWith('+'))
                {
                    value = value.slice(0, -1);
                }
                value += op;
            }

            function del()
            {
                value = value.slice(0, -1);
                if(value === '')
                {
                    value = '0';
                }
            }
        </script>
</html>
