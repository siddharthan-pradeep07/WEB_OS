<!DOCTYPE html>
<html>
    <head>
        <title>Searchy</title>
    </head>
         <body>
           <h1>Searchy</h1>

           <input id="67" type="text" placeholder="Text your curiosity">
           <button onclick="ask()">Go</button>

           <p id="ans">....</p>
                
            <script>
                async function ask()
                {
                    const question = document.getElementById('67').value;
                    document.getElementById('ans').textContent = 'Analizing your curiosity...';

                    const result = await fetch('https://api.cohere.ai/v1/chat',
                    {
                        method: 'POST',
                        headers: 
                          {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer zifrpXHD5A3xSDt6b9AUHOkh8xXjr2KwH2hvC7hy'
                           },
                            body: JSON.stringify({
                            model: 'command-r',
                            message: question
                           }) 
                    });

                    const data = await result.json();
                    console.log(data);
                    document.getElementById('ans').textContent = data.text;

                }
            </script>
         </body>
</html>
