<!DOCTYPE html>
<html>
    <head>
        <title>Searchy</title>
        <style>
            button
            {
                padding: 6px 12px;
                font-size: 14px;
                border: none;
                outline: none;
                background: #ffffff67;
                cursor: pointer;
                font-family:Arial, Helvetica, sans-serif;
            }
        </style>
    </head>
         <body>
            <input id="url-input" type="text" placeholder="Enter a URL..." onkeydown="if(event.key==='Enter')browserGo()">
            <button onclick="browserGo()">Search.</button>

            <br>
            <br>

            <iframe id="browser-frame" src="" style="width:100%; height:80vh; border:none; border-radius:5px;"></iframe>
            <script>
                function browserGo()
                {
                    let url = document.getElementById('url-input').value.trim();
                    if (!url) return;
                    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
                    
                    document.getElementById('browser-frame').src = url;
                }
            </script>
        </body>

</html>
