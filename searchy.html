<!DOCTYPE html>
<html>
    <head>
        <title>Searchy</title>
    </head>
         <body>
           <h1>Searchy</h1>

           <input id="67" type="text" placeholder="Text your curiosity">
           <button onclick="ask()">Go</button>

           <p id="ans">....</p>
                
            <script>
                async function ask()
                {
                    const question = document.getElementById('67').value;
                    document.getElementById('ans').textContent = 'Analizing your curiosity...';

                    const result = await fetch('https://openrouter.ai/api/v1/chat/completions', 
                    {
                        method: 'POST',
                        headers: 
                          {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer YOUR_OPENROUTER_KEY_HERE'
                           },
                           body: JSON.stringify({
                            model: 'openai/gpt-4o',
                            messages: [{role: 'user', content: question}]
                           }) 
                    });

                    const data = await result.json();
                    console.log(data);
                    document.getElementById('ans').textContent = data.choices[0].message.content;

                }
            </script>
         </body>
</html>
